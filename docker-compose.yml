services:
  postgres:
    image: postgres:16-alpine
    container_name: vocabjp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vocabjp
      POSTGRES_PASSWORD: vocabjp_secret
      POSTGRES_DB: vocabjp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vocabjp -d vocabjp']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
